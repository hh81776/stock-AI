<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockAI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;--accent:#4f8ef7;--accent2:#3d7be8;--green:#34d399;--red:#f87171;--amber:#fbbf24;--teal:#2dd4bf;--r:10px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
body{min-height:100vh}
.shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column;gap:5px;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:26px 30px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:18px}
.brand-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.brand-name{font-size:15px;font-weight:600}
.brand-sub{font-size:11px;color:var(--text2)}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:4px 8px;margin-top:10px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.15);color:var(--accent)}
.wl-wrap{margin-top:auto;padding-top:14px;border-top:1px solid var(--border)}
.wl-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;padding:0 4px}
.wl-item{display:flex;justify-content:space-between;align-items:center;padding:7px 6px;border-radius:8px;cursor:pointer;transition:background .15s}
.wl-item:hover{background:var(--bg3)}
.wl-sym{font-weight:600;font-family:'DM Mono',monospace;font-size:13px}
.wl-badge{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(79,142,247,.15);color:var(--accent);font-weight:500}
.ptitle{font-size:22px;font-weight:600;margin-bottom:3px;letter-spacing:-.02em}
.psub{font-size:13px;color:var(--text2);margin-bottom:16px}
.srow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sinput{flex:1;min-width:180px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:0 14px;height:44px;font-size:15px;color:var(--text);font-family:'DM Mono',monospace;letter-spacing:.05em;text-transform:uppercase;transition:border .2s}
.sinput:focus{outline:none;border-color:var(--accent)}
.sinput::placeholder{color:var(--text3);font-family:'Outfit',sans-serif;text-transform:none;letter-spacing:0;font-size:13px}
.sbtn{height:44px;padding:0 22px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,transform .1s;white-space:nowrap}
.sbtn:hover{background:var(--accent2)}
.sbtn:active{transform:scale(.97)}
.sbtn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;background:var(--bg2);color:var(--text2);cursor:pointer;border:1px solid var(--border);transition:all .15s;font-family:'DM Mono',monospace}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:rgba(79,142,247,.2);border-color:var(--accent);color:var(--accent)}
.statusbar{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);font-size:13px;color:var(--text2);margin:12px 0 18px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.idle{background:var(--text3)}.sdot.loading{background:var(--amber);animation:blink 1s infinite}.sdot.done{background:var(--green)}.sdot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.tsym{font-size:28px;font-weight:600;letter-spacing:-.02em;font-family:'DM Mono',monospace}
.etag{font-size:11px;padding:3px 8px;border-radius:7px;background:rgba(79,142,247,.15);color:var(--accent);font-weight:600}
.cname{font-size:14px;color:var(--text2);margin-top:3px}
.stag{font-size:11px;color:var(--text3);margin-top:2px}
.pbig{font-size:34px;font-weight:300;letter-spacing:-.03em;font-family:'DM Mono',monospace;line-height:1;text-align:right}
.pch{font-size:13px;margin-top:4px;text-align:right}
.prng{font-size:11px;color:var(--text3);margin-top:3px;text-align:right}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:820px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.shell{grid-template-columns:1fr}.sidebar{display:none}}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px}
.mc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px}
.mc-val{font-size:19px;font-weight:500;font-family:'DM Mono',monospace;line-height:1}
.mc-sub{font-size:11px;color:var(--text2);margin-top:4px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.sc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:13px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.dr:last-child{border-bottom:none}
.dl{color:var(--text2)}
.dv{font-weight:500;font-family:'DM Mono',monospace;font-size:12px}
.sigs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.si{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:var(--bg3);border-radius:8px;font-size:12px;line-height:1.4}
.sdot2{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ttrack{position:relative;height:7px;background:var(--bg3);border-radius:4px;margin:7px 0}
.tfill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--teal))}
.tcursor{position:absolute;top:-4px;width:3px;height:15px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.tlabels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.arow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.arow:last-child{border-bottom:none}
.afirm{width:115px;color:var(--text2);flex-shrink:0}
.abarbg{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.abarfill{height:100%;border-radius:2px;background:var(--accent)}
.aval{width:70px;text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.rrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.rrow:last-child{border-bottom:none}
.rlbl{width:115px;color:var(--text2);flex-shrink:0}
.rbg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.rfill{height:100%;border-radius:3px}
.rlv{width:24px;text-align:right;font-size:11px}
.clist{list-style:none}
.clist li{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:flex-start;line-height:1.5}
.clist li:last-child{border-bottom:none}
.cbullet{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
.compg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.compcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:12px}
.compcard.ft{border-color:var(--accent)}
.compname{font-size:13px;font-weight:600;margin-bottom:6px}
.compr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.compr:last-child{border-bottom:none}
.compr span:last-child{color:var(--text);font-family:'DM Mono',monospace;font-size:11px}
.platrow{display:flex;align-items:center;gap:9px;padding:5px 0}
.platlbl{width:90px;color:var(--text2);flex-shrink:0;font-size:11px}
.platbg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.platfill{height:100%;border-radius:3px}
.platpct{width:30px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:7px;font-weight:500}
.bs{background:rgba(52,211,153,.15);color:var(--green)}
.bb{background:rgba(79,142,247,.15);color:var(--accent)}
.bh{background:rgba(251,191,36,.15);color:var(--amber)}
.bsl{background:rgba(248,113,113,.15);color:var(--red)}
.chartw{position:relative;width:100%;height:185px}
.empty{text-align:center;padding:70px 20px}
.empty-icon{font-size:50px;margin-bottom:14px;opacity:.2}
.empty-title{font-size:20px;font-weight:500;margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text2)}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}
.skel{background:var(--bg3);border-radius:8px;animation:shimmer 1.5s infinite}
.disc{font-size:11px;color:var(--text3);padding:14px 0;border-top:1px solid var(--border);margin-top:4px;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">📊</div>
    <div><div class="brand-name">StockAI</div><div class="brand-sub">AI 股票分析平台</div></div>
  </div>
  <div class="nav-label">工具</div>
  <div class="nav-item active">📋&nbsp;&nbsp;總覽 Dashboard</div>
  <div class="nav-item">📈&nbsp;&nbsp;技術分析</div>
  <div class="nav-item">💰&nbsp;&nbsp;財務報表</div>
  <div class="nav-item">🌐&nbsp;&nbsp;競爭分析</div>
  <div class="wl-wrap">
    <div class="wl-title">快速查詢</div>
    <div class="wl-item" onclick="qs('FTAI')"><span class="wl-sym">FTAI</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('2330.TW')"><span class="wl-sym">2330.TW</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('NVDA')"><span class="wl-sym">NVDA</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('AAPL')"><span class="wl-sym">AAPL</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('TSLA')"><span class="wl-sym">TSLA</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('META')"><span class="wl-sym">META</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('MSFT')"><span class="wl-sym">MSFT</span><span class="wl-badge">查詢</span></div>
    <div class="wl-item" onclick="qs('TSM')"><span class="wl-sym">TSM</span><span class="wl-badge">查詢</span></div>
  </div>
</aside>
<main class="main">
  <div class="ptitle">股票分析 Dashboard</div>
  <div class="psub">輸入任意股票代碼，由 Claude AI 即時生成完整分析報告</div>
  <div class="srow">
    <input type="text" class="sinput" id="ti" placeholder="輸入股票代碼，例如：AAPL、NVDA、2330.TW" maxlength="12"/>
    <button class="sbtn" id="sb" onclick="run()">🔍 分析</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="sc(this,'FTAI')">FTAI</span>
    <span class="chip" onclick="sc(this,'NVDA')">NVDA</span>
    <span class="chip" onclick="sc(this,'AAPL')">AAPL</span>
    <span class="chip" onclick="sc(this,'TSLA')">TSLA</span>
    <span class="chip" onclick="sc(this,'MSFT')">MSFT</span>
    <span class="chip" onclick="sc(this,'META')">META</span>
    <span class="chip" onclick="sc(this,'AMZN')">AMZN</span>
    <span class="chip" onclick="sc(this,'2330.TW')">2330.TW</span>
    <span class="chip" onclick="sc(this,'TSM')">TSM</span>
  </div>
  <div class="statusbar"><div class="sdot idle" id="dot"></div><span id="st">請輸入股票代碼或點選快速選項開始分析</span></div>
  <div id="dc">
    <div class="empty">
      <div class="empty-icon">📈</div>
      <div class="empty-title">選擇股票開始分析</div>
      <div class="empty-sub">AI 自動搜尋最新資料，生成完整財務、技術面、競爭分析報告</div>
    </div>
  </div>
</main>
</div>
<script>
let chart=null,busy=false;
function sc(el,t){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');document.getElementById('ti').value=t;run();}
function qs(t){document.getElementById('ti').value=t;run();}
document.getElementById('ti').addEventListener('keydown',e=>{if(e.key==='Enter')run();setTimeout(()=>{e.target.value=e.target.value.toUpperCase();},0);});
function ss(s,t){document.getElementById('dot').className='sdot '+s;document.getElementById('st').textContent=t;}
async function run(){
  if(busy)return;
  const tk=document.getElementById('ti').value.trim().toUpperCase();
  if(!tk)return;
  busy=true;document.getElementById('sb').disabled=true;
  ss('loading','正在分析 '+tk+'，請稍候約 15 秒...');
  document.getElementById('dc').innerHTML='<div>'+Array(3).fill('<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px">'+Array(4).fill('<div class="skel" style="height:68px"></div>').join('')+'</div>').join('')+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="skel" style="height:210px"></div><div class="skel" style="height:210px"></div></div></div>';
  const prompt=`你是專業股票分析師。針對股票 "${tk}" 提供完整分析，只回傳以下 JSON，不要任何說明或 markdown：\n{"ticker":"代碼","exchange":"交易所","company":"公司全名","sector":"產業","currency":"USD或TWD","price":"股價","change":"漲跌額","changePct":"漲跌%","isUp":true,"week52High":"52週高","week52Low":"52週低","marketCap":"市值","peRatio":"本益比","eps":"EPS","dividend":"股息","dividendYield":"殖利率","revenue":"季營收","revenueGrowth":"YoY%","netIncome":"季淨利","grossMargin":"毛利率","operatingMargin":"營業率","netMargin":"淨利率","ebitda":"EBITDA","roe":"ROE","quarterlyRevenue":[5季數字由舊到新],"quarterlyNetIncome":[5季數字],"quarterlyLabels":["Q1 2025","Q2 2025","Q3 2025","Q4 2025","Q1 2026"],"guidance":"全年指引","guidanceGrowth":"成長率","signals":[{"text":"信號","type":"bullish"},{"text":"信號","type":"bullish"},{"text":"信號","type":"bearish"},{"text":"信號","type":"neutral"},{"text":"信號","type":"bearish"},{"text":"信號","type":"neutral"}],"analystRating":"Strong Buy","analystCount":"人數","analysts":[{"firm":"券商","target":"目標價","rating":"Buy","barPct":85},{"firm":"券商2","target":"目標價","rating":"Strong Buy","barPct":100},{"firm":"分析師平均","target":"均價","rating":"Buy","barPct":75},{"firm":"最低目標","target":"低價","rating":"Hold","barPct":40}],"targetLow":"數字","targetAvg":"數字","targetHigh":"數字","targetCurrent":60,"catalysts":["催化劑1","催化劑2","催化劑3","催化劑4"],"risks":[{"label":"風險1","level":80,"severity":"高"},{"label":"風險2","level":60,"severity":"中高"},{"label":"風險3","level":45,"severity":"中"},{"label":"風險4","level":30,"severity":"低中"}],"competitors":[{"name":"自身","ticker":"${tk}","m1l":"市佔率","m1":"值","m2l":"毛利率","m2":"值","m3":"Strong Buy","featured":true},{"name":"對手1","ticker":"代碼","m1l":"定位","m1":"值","m2l":"優勢","m2":"值","m3":"Buy","featured":false},{"name":"對手2","ticker":"代碼","m1l":"定位","m1":"值","m2l":"劣勢","m2":"值","m3":"Hold","featured":false}],"platforms":[{"label":"業務1","pct":60,"color":"#4f8ef7"},{"label":"業務2","pct":25,"color":"#34d399"},{"label":"業務3","pct":10,"color":"#fbbf24"},{"label":"其他","pct":5,"color":"#a78bfa"}],"nextEarnings":"日期","summary":"2-3句投資評估"}`;
  try{
    const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+res.status);}
    const data=await res.json();
    const raw=data.content[0].text.replace(/```json|```/g,'').trim();
    const info=JSON.parse(raw);
    render(info);
    ss('done','✓ '+info.company+'（'+info.ticker+'）分析完成 — '+new Date().toLocaleTimeString('zh-TW'));
  }catch(err){
    ss('error','分析失敗：'+err.message);
    document.getElementById('dc').innerHTML='<div style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:20px;color:var(--red);font-size:14px;line-height:1.8"><strong>⚠️ 分析失敗</strong><br><br>'+err.message+'</div>';
  }finally{busy=false;document.getElementById('sb').disabled=false;}
}
function bdg(r){const m={'Strong Buy':'bs','Buy':'bb','Hold':'bh','Sell':'bsl'};return '<span class="badge '+(m[r]||'bh')+'">'+r+'</span>';}
const rc={高:'#f87171',中高:'#fb923c',中:'#fbbf24',低中:'#34d399',低:'#2dd4bf'};
const cs=c=>c==='TWD'?'NT$':c==='USD'?'$':(c+' ');
function render(d){
  if(chart){chart.destroy();chart=null;}
  const sym=cs(d.currency),up=d.isUp,cc=up?'green':'red',ar=up?'▲':'▼';
  document.getElementById('dc').innerHTML=`
  <div class="hero">
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <span class="tsym">${d.ticker}</span><span class="etag">${d.exchange}</span>${bdg(d.analystRating)}
      </div>
      <div class="cname">${d.company}</div>
      <div class="stag">${d.sector} ・ ${d.analystCount}位分析師 ・ 下次財報：${d.nextEarnings}</div>
    </div>
    <div>
      <div class="pbig">${sym}${d.price}</div>
      <div class="pch ${cc}">${ar} ${d.change} (${d.changePct})</div>
      <div class="prng">52W：${d.week52Low} — ${d.week52High}</div>
    </div>
  </div>
  <div style="background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.18);border-radius:12px;padding:12px 15px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.7">${d.summary}</div>
  <div class="g4">
    <div class="mc"><div class="mc-lbl">市值</div><div class="mc-val">${d.marketCap}</div></div>
    <div class="mc"><div class="mc-lbl">季營收</div><div class="mc-val">${d.revenue}</div><div class="mc-sub ${cc}">${ar} ${d.revenueGrowth}</div></div>
    <div class="mc"><div class="mc-lbl">季淨利</div><div class="mc-val">${d.netIncome}</div></div>
    <div class="mc"><div class="mc-lbl">EPS</div><div class="mc-val">${d.eps}</div></div>
    <div class="mc"><div class="mc-lbl">毛利率</div><div class="mc-val green">${d.grossMargin}</div></div>
    <div class="mc"><div class="mc-lbl">淨利率</div><div class="mc-val">${d.netMargin}</div></div>
    <div class="mc"><div class="mc-lbl">ROE</div><div class="mc-val">${d.roe}</div></div>
    <div class="mc"><div class="mc-lbl">股息殖利率</div><div class="mc-val">${d.dividendYield}</div><div class="mc-sub">${d.dividend}/季</div></div>
  </div>
  <div class="g2">
    <div class="sc"><div class="sc-title">📊 季度財務趨勢</div><div class="chartw"><canvas id="tc" role="img" aria-label="季度財務趨勢圖"></canvas></div><div style="display:flex;gap:12px;margin-top:7px;font-size:11px;color:var(--text2)"><span><span style="display:inline-block;width:8px;height:8px;background:#4f8ef7;border-radius:2px;margin-right:3px"></span>營收</span><span><span style="display:inline-block;width:8px;height:8px;background:#34d399;border-radius:2px;margin-right:3px"></span>淨利</span></div></div>
    <div class="sc"><div class="sc-title">🔍 技術面信號</div><div class="sigs">${(d.signals||[]).map(s=>'<div class="si"><div class="sdot2" style="background:'+(s.type==='bullish'?'var(--green)':s.type==='bearish'?'var(--red)':'var(--amber)')+'"></div>'+s.text+'</div>').join('')}</div></div>
  </div>
  <div class="g2">
    <div class="sc"><div class="sc-title">🎯 全年財務指引</div><div style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">${d.guidance}</div><div class="dr"><span class="dl">指引成長率</span><span class="dv green">${d.guidanceGrowth}</span></div><div class="dr"><span class="dl">P/E Ratio</span><span class="dv">${d.peRatio}</span></div><div class="dr"><span class="dl">EBITDA</span><span class="dv">${d.ebitda}</span></div><div class="dr"><span class="dl">營業利益率</span><span class="dv">${d.operatingMargin}</span></div></div>
    <div class="sc"><div class="sc-title">🏢 業務結構</div>${(d.platforms||[]).map(p=>'<div class="platrow"><div class="platlbl">'+p.label+'</div><div class="platbg"><div class="platfill" style="width:'+p.pct+'%;background:'+p.color+'"></div></div><div class="platpct">'+p.pct+'%</div></div>').join('')}</div>
  </div>
  <div class="sc"><div class="sc-title">🎯 分析師目標價</div><div style="margin-bottom:13px"><div class="tlabels" style="margin-bottom:4px"><span>低 ${d.targetLow}</span><span>均 ${d.targetAvg}</span><span>高 ${d.targetHigh}</span></div><div class="ttrack"><div class="tfill" style="width:${d.targetCurrent||50}%"></div><div class="tcursor" style="left:${d.targetCurrent||50}%"></div></div><div style="font-size:11px;color:var(--text3);margin-top:3px">白線 = 當前股價位置（${d.targetCurrent}%）</div></div>${(d.analysts||[]).map(a=>'<div class="arow"><span class="afirm">'+a.firm+'</span><div class="abarbg"><div class="abarfill" style="width:'+a.barPct+'%"></div></div><span class="aval">'+a.target+'</span>'+bdg(a.rating)+'</div>').join('')}</div>
  <div class="g2">
    <div class="sc"><div class="sc-title">⚡ 成長催化劑</div><ul class="clist">${(d.catalysts||[]).map(c=>'<li><div class="cbullet"></div>'+c+'</li>').join('')}</ul></div>
    <div class="sc"><div class="sc-title">⚠️ 風險評估</div>${(d.risks||[]).map(r=>'<div class="rrow"><span class="rlbl">'+r.label+'</span><div class="rbg"><div class="rfill" style="width:'+r.level+'%;background:'+(rc[r.severity]||'#fbbf24')+'"></div></div><span class="rlv" style="color:'+(rc[r.severity]||'#fbbf24')+'">'+r.severity+'</span></div>').join('')}</div>
  </div>
  <div class="sc"><div class="sc-title">🌐 競爭對手比較</div><div class="compg">${(d.competitors||[]).map(c=>'<div class="compcard '+(c.featured?'ft':'')+'"><div class="compname">'+c.name+' <span style="color:var(--text3);font-size:11px">'+c.ticker+'</span></div><div class="compr"><span>'+c.m1l+'</span><span>'+c.m1+'</span></div><div class="compr"><span>'+c.m2l+'</span><span>'+c.m2+'</span></div><div class="compr"><span>評級</span><span>'+c.m3+'</span></div></div>').join('')}</div></div>
  <div class="disc">⚠️ 本 Dashboard 資料由 AI 自動生成，僅供參考，不構成投資建議。投資決策請自行評估風險並諮詢專業顧問。</div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('tc');if(!ctx)return;
    chart=new Chart(ctx,{type:'bar',data:{labels:d.quarterlyLabels||[],datasets:[{label:'營收',data:d.quarterlyRevenue||[],backgroundColor:'rgba(79,142,247,.75)',borderRadius:4},{label:'淨利',data:d.quarterlyNetIncome||[],backgroundColor:'rgba(52,211,153,.75)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#8b90a0',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8b90a0',font:{size:10}}}}}});
  },80);
}
</script>
</body>
</html>
